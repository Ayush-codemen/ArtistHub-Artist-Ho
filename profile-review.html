<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Reviews | Artist Ho</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="profile-header">
            <div class="profile-info">
                <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-picture">
                <div>
                    <h1>Artist Name</h1>
                    <p class="profile-type">Music Producer</p>
                    <div class="average-rating">
                        <span class="stars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </span>
                        <span class="rating-value">4.5</span>
                        <span class="review-count">(24 reviews)</span>
                    </div>
                </div>
            </div>
            <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Profile</a>
        </header>

        <section class="review-form-section">
            <h2>Write a Review</h2>
            <form id="reviewForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label>Rating</label>
                    <div class="star-rating">
                        <i class="far fa-star" data-rating="1"></i>
                        <i class="far fa-star" data-rating="2"></i>
                        <i class="far fa-star" data-rating="3"></i>
                        <i class="far fa-star" data-rating="4"></i>
                        <i class="far fa-star" data-rating="5"></i>
                        <input type="hidden" id="rating" name="rating" value="0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="review">Your Review</label>
                    <textarea id="review" name="review" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="submit-button">Submit Review</button>
            </form>
        </section>

        <section class="reviews-section">
            <h2>Reviews</h2>
            <div class="reviews-container" id="reviewsContainer">
                <!-- Reviews will be loaded here -->
            </div>
        </section>
    </div>

    <script src="review.js"></script>
</body>
</html>
